<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>B&W Dev Data - My Darkroom</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Darkroom">
  <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=180&h=180&fit=crop&q=80">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    html, body { 
      background-color: #D1D1D1 !important; 
      color: #19E38B; 
      margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden;
    }
    body { padding-bottom: 120px; }
    select { background-color: #1a1a1a !important; color: #ffffff !important; border-color: #333 !important; }
    .welcome-msg { font-family: 'Courier New', Courier, monospace; color: #444; animation: pulse 4s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
    .card { background-color: #1a1a1a; border: 1px solid #2a2a2a; transition: all 0.2s ease; }
    .card:hover { border-color: #19E38B; transform: translateY(-2px); }
    .font-timer { font-family: 'Courier New', Courier, monospace; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 relative bg-[#050505]">

  <div id="appContainer" class="w-full flex flex-col items-center">
    <header class="w-full max-w-4xl text-center py-4">
      <button id="syncBtn" onclick="fetchDataFromAPI()" class="text-xs text-gray-500 hover:text-[#19E38B] tracking-widest border border-gray-800 px-3 py-1 rounded-full bg-[#111] transition active:scale-95 mb-3">
        <i class="fa-solid fa-rotate mr-1"></i> <span id="syncStatus">LOADED FROM CACHE</span>
      </button>
      <h1 class="text-xl font-black tracking-widest text-[#278EF5] uppercase">Find your developing recipes here</h1>
      <div class="h-0.5 w-6 bg-[#278EF5] mx-auto mt-2"></div>
    </header>

    <div class="w-full max-w-3xl space-y-3 mb-6">
      <div class="grid grid-cols-3 gap-3">
        <div>
          <label class="text-[10px] text-gray-500 uppercase tracking-tighter ml-1">Brand</label>
          <select id="brandSelect" onchange="onBrandChange()" class="w-full p-3 rounded-lg border focus:ring-1 focus:ring-emerald-600 outline-none cursor-pointer text-sm">
            <option value="">Select Brand</option>
          </select>
        </div>
        <div>
          <label class="text-[10px] text-gray-500 uppercase tracking-tighter ml-1">Film</label>
          <select id="filmSelect" onchange="onFilmChange()" class="w-full p-3 rounded-lg border focus:ring-1 focus:ring-emerald-600 outline-none cursor-pointer text-sm">
            <option value="">Select Film</option>
          </select>
        </div>
        <div>
          <label class="text-[10px] text-gray-500 uppercase tracking-tighter ml-1">Developer</label>
          <select id="developerSelect" onchange="onDeveloperChange()" class="w-full p-3 rounded-lg border focus:ring-1 focus:ring-emerald-600 outline-none cursor-pointer text-sm">
            <option value="">Select Developer</option>
          </select>
        </div>
      </div>
    </div>

    <main id="mainArea" class="w-full max-w-5xl">
      <div id="welcomeArea" class="text-center py-12">
        <p class="welcome-msg text-lg italic uppercase">Welcome to my darkroom :)</p>
        <i class="fa-solid fa-lightbulb mt-4 opacity-10 text-3xl"></i>
      </div>
      <div id="resultArea" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 auto-rows-max"></div>
    </main>
  </div>

  <div id="timerOverlay" class="fixed inset-0 bg-[#050505] z-50 hidden flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-md text-center space-y-6">
      
      <div class="inline-block bg-neutral-900 border border-neutral-800 rounded-full px-4 py-1">
        <span id="stepIndicator" class="text-xs font-mono font-bold tracking-widest text-[#19E38B]">DEVELOPING</span>
      </div>

      <div>
        <span id="timerSub" class="text-xs font-bold text-gray-500 uppercase tracking-widest block"></span>
        <h2 id="timerTitle" class="text-2xl font-black text-white mt-1"></h2>
        <p id="timerDetail" class="text-sm text-gray-400 mt-1"></p>
      </div>

      <div class="py-12 bg-[#111] rounded-3xl border border-gray-900 shadow-2xl">
        <div id="timerDisplay" class="text-7xl font-black font-timer text-white tracking-tighter">00:00</div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <button id="startPauseBtn" onclick="handleMainButtonClick()" class="py-4 rounded-xl font-bold bg-green-600 text-white hover:bg-green-700 transition active:scale-95 text-sm tracking-wider uppercase">TIMER START</button>
        <button id="resetBtn" onclick="resetMainTimer()" class="py-4 rounded-xl font-bold bg-gray-900 text-gray-400 border border-gray-800 hover:bg-gray-800 transition active:scale-95">RESET</button>
      </div>

      <div>
        <button onclick="closeTimer()" class="text-xs text-gray-600 hover:text-gray-400 tracking-widest uppercase mt-4"><i class="fa-solid fa-xmark mr-2"></i> Close</button>
      </div>
    </div>
  </div>

  <div class="fixed bottom-0 left-0 right-0 bg-[#111] border-t border-gray-900 p-3 z-40 shadow-2xl">
    <div class="max-w-5xl mx-auto">
      <div class="grid grid-cols-4 gap-2 text-center">
        
        <button onclick="openGenericTimer('WASH1', 3*60, 'text-blue-400', 'Water Wash')" class="bg-[#161616] border border-gray-800 hover:border-blue-400 p-2.5 rounded-xl transition flex flex-col items-center justify-center">
          <span class="text-[11px] font-bold text-blue-400 block">2. WASH 3 min</span>
          <span class="text-xs text-gray-500 font-mono mt-0.5 font-bold">START</span>
        </button>

        <button onclick="openGenericTimer('FIX', 5*60, 'text-amber-500', 'Non-hardening Fixer')" class="bg-[#161616] border border-gray-800 hover:border-amber-500 p-2.5 rounded-xl transition flex flex-col items-center justify-center">
          <span class="text-[11px] font-bold text-amber-500 block">3. FIX 5 min</span>
          <span class="text-xs text-gray-500 font-mono mt-0.5 font-bold">START</span>
        </button>

        <button onclick="openGenericTimer('WASH2', 7*60, 'text-blue-400', 'Water Wash')" class="bg-[#161616] border border-gray-800 hover:border-blue-400 p-2.5 rounded-xl transition flex flex-col items-center justify-center">
          <span class="text-[11px] font-bold text-blue-400 block">4. WASH 7 min</span>
          <span class="text-xs text-gray-500 font-mono mt-0.5 font-bold">START</span>
        </button>

        <button onclick="openGenericTimer('FLO', 1*60, 'text-fuchsia-400', 'Photo Flo')" class="bg-[#161616] border border-gray-800 hover:border-fuchsia-400 p-2.5 rounded-xl transition flex flex-col items-center justify-center">
          <span class="text-[11px] font-bold text-white block">5. PHOTO FLO 1 min</span>
          <span class="text-xs text-gray-500 font-mono mt-0.5 font-bold">START</span>
        </button>

      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzgmsE3vr9R2cZ4d8yKtCL8RFSWVV7RJg4rQuQsxP-KbSri13AnoX0cUQuM6Ut6rGAf/exec";

    let masterData = []; 
    let currentFilteredData = []; 
    
    // 単一管理されるタイマーステート
    let timerInterval = null;
    let totalSeconds = 0;
    let initialSeconds = 0;
    let isTimerRunning = false;
    
    // 現在どの工程を走らせているかの識別子 ('DEV', 'WASH1', 'FIX', 'WASH2', 'FLO')
    let currentStepKey = 'DEV'; 

    window.onload = function() {
      const cachedData = localStorage.getItem('darkroom_master_data');
      if (cachedData) {
        masterData = JSON.parse(cachedData);
        updateStatusDisplay("LOADED FROM CACHE");
        initBrandDropdown();
      } else {
        fetchDataFromAPI();
      }
    };

    async function fetchDataFromAPI() {
      updateStatusDisplay("SYNCING DATA...");
      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error('Network response was not ok');
        const data = await response.json();
        if (data && data.length > 0) {
          masterData = data;
          localStorage.setItem('darkroom_master_data', JSON.stringify(data));
          updateStatusDisplay("UPDATED JUST NOW");
          initBrandDropdown();
          hideResults();
        } else {
          throw new Error('Data is empty');
        }
      } catch (error) {
        console.error("Fetch error:", error);
        updateStatusDisplay(masterData.length > 0 ? "SYNC FAILED (USING CACHE)" : "ERROR: NO DATA FOUND");
      }
    }

    function updateStatusDisplay(text) { document.getElementById('syncStatus').textContent = text; }
    function getDevValue(item) { return item['Dev'] || item['Developer'] || '-'; }

    function initBrandDropdown() {
      const brandSelect = document.getElementById('brandSelect');
      brandSelect.innerHTML = '<option value="">Select Brand</option>';
      const brands = [...new Set(masterData.map(item => item['Brand']).filter(b => b && b !== '-'))].sort();
      brands.forEach(brand => {
        const opt = document.createElement('option'); opt.value = brand; opt.textContent = brand; brandSelect.appendChild(opt);
      });
    }

    function onBrandChange() {
      const brandSelect = document.getElementById('brandSelect'); const filmSelect = document.getElementById('filmSelect'); const devSelect = document.getElementById('developerSelect'); const selectedBrand = brandSelect.value;
      filmSelect.innerHTML = '<option value="">Select Film</option>'; devSelect.innerHTML = '<option value="">Select Dev</option>';
      if (!selectedBrand) { hideResults(); return; }
      
      const films = [];
      masterData.forEach(item => { if (item.Brand === selectedBrand && item.Film && !films.includes(item.Film)) { films.push(item.Film); } });
      films.sort().forEach(film => { const opt = document.createElement('option'); opt.value = film; opt.textContent = film; filmSelect.appendChild(opt); });
      filterAndDisplayData();
    }

    function onFilmChange() {
      const brandSelect = document.getElementById('brandSelect'); const filmSelect = document.getElementById('filmSelect'); const devSelect = document.getElementById('developerSelect'); const selectedBrand = brandSelect.value; const selectedFilm = filmSelect.value;
      devSelect.innerHTML = '<option value="">Select Dev</option>';
      if (!selectedFilm) { filterAndDisplayData(); return; }
      
      const developers = [];
      masterData.forEach(item => { if (item.Brand === selectedBrand && item.Film === selectedFilm) { const devVal = getDevValue(item); if (devVal && devVal !== '-' && !developers.includes(devVal)) { developers.push(devVal); } } });
      developers.sort().forEach(dev => { const opt = document.createElement('option'); opt.value = dev; opt.textContent = dev; devSelect.appendChild(opt); });
      filterAndDisplayData();
    }

    function onDeveloperChange() { filterAndDisplayData(); }

    function filterAndDisplayData() {
      const brand = document.getElementById('brandSelect').value; const film = document.getElementById('filmSelect').value; const dev = document.getElementById('developerSelect').value;
      if (!brand) { hideResults(); return; }
      currentFilteredData = masterData.filter(item => {
        const matchBrand = item['Brand'] === brand; const matchFilm = !film || item['Film'] === film; const matchDev = !dev || getDevValue(item) === dev;
        return matchBrand && matchFilm && matchDev;
      });
      renderResults(currentFilteredData);
    }

    function renderResults(data) {
      const resultArea = document.getElementById('resultArea'); const welcomeArea = document.getElementById('welcomeArea');
      welcomeArea.classList.add('hidden'); resultArea.classList.remove('hidden'); resultArea.innerHTML = '';
      if (data.length === 0) { resultArea.innerHTML = '<p class="text-center text-gray-500 py-8 text-sm col-span-full">No data found</p>'; return; }
      data.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'card p-5 rounded-2xl shadow-xl flex flex-col justify-between space-y-4 h-full cursor-pointer';
        card.setAttribute('onclick', `openTimerByRecipe(${index})`);
        card.innerHTML = `
          <div class="border-b border-gray-800 pb-3 flex justify-between items-start">
            <div>
              <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest block">${item['Brand']}</span>
              <h2 class="text-lg font-bold text-white mt-0.5 leading-tight">${item['Film']}</h2>
              <div class="mt-2 inline-flex items-center bg-gray-800 px-2 py-0.5 rounded"><span class="text-[9px] font-mono text-gray-400 mr-1.5">EI</span><span class="text-xs font-bold text-white">${item['EI'] || '-'}</span></div>
            </div>
            <div class="text-right pl-2 flex-shrink-0">
              <span class="text-3xl font-black text-white font-mono tracking-tighter block">${item['Time (min)'] || '0:00'}</span>
              <span class="text-[10px] font-bold text-gray-500 block mt-0.5 uppercase">${item['Temp (℃)'] || '-'}°C</span>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-2 text-xs pt-1">
            <div><span class="text-gray-600 text-[9px] uppercase font-bold tracking-wider block mb-0.5">Developer</span><span class="font-medium text-gray-200 block truncate">${getDevValue(item)}</span></div>
            <div><span class="text-gray-600 text-[9px] uppercase font-bold tracking-wider block mb-0.5">Dilution</span><span class="font-semibold text-gray-200 block truncate">${item['Dillution'] || '-'}</span></div>
          </div>
        `;
        resultArea.appendChild(card);
      });
    }

    function hideResults() { document.getElementById('resultArea').classList.add('hidden'); document.getElementById('welcomeArea').classList.remove('hidden'); }

    // --- ⏳ タイマー呼び出し口（レシピ選択時：現像） ---
    function openTimerByRecipe(index) {
      const item = currentFilteredData[index];
      if (!item) return;

      clearInterval(timerInterval);
      isTimerRunning = false;
      currentStepKey = 'DEV';

      const timeValue = item['Time (min)'] || '0:00';
      totalSeconds = parseTimeToSeconds(timeValue);
      initialSeconds = totalSeconds;

      if (totalSeconds <= 0) { alert("有効な現像時間がありません。"); return; }

      const indicator = document.getElementById('stepIndicator');
      indicator.textContent = "DEVELOPING";
      indicator.className = "text-xs font-mono font-bold tracking-widest text-[#19E38B]";

      document.getElementById('timerSub').textContent = item['Brand'];
      document.getElementById('timerTitle').textContent = item['Film'];
      document.getElementById('timerDetail').textContent = `${getDevValue(item)} / ${item['Temp (℃)'] || '-'}°C / EI: ${item['EI'] || '-'}`;

      initAndShowOverlay();
    }

    // --- 🎛️ タイマー呼び出し口（ボトムバーから直接ジャンプ時） ---
    function openGenericTimer(stepKey, seconds, colorClass, detailText) {
      clearInterval(timerInterval);
      isTimerRunning = false;
      currentStepKey = stepKey;

      totalSeconds = seconds;
      initialSeconds = totalSeconds;

      let displayTitle = "";
      if(stepKey === 'WASH1') displayTitle = "1st WASH 3 min";
      if(stepKey === 'FIX') displayTitle = "FIX 5 min";
      if(stepKey === 'WASH2') displayTitle = "2nd WASH 7 min";
      if(stepKey === 'FLO') displayTitle = "PHOTO FLO 1 min";

      const indicator = document.getElementById('stepIndicator');
      indicator.textContent = displayTitle.toUpperCase();
      indicator.className = `text-xs font-mono font-bold tracking-widest ${colorClass}`;

      document.getElementById('timerSub').textContent = "WORKFLOW";
      document.getElementById('timerTitle').textContent = displayTitle;
      document.getElementById('timerDetail').textContent = detailText;

      initAndShowOverlay();
    }

    function initAndShowOverlay() {
      document.getElementById('timerDisplay').classList.remove('text-red-500', 'animate-pulse');
      updateTimerDisplay();

      const btn = document.getElementById('startPauseBtn');
      btn.textContent = "TIMER START";
      btn.className = "py-4 rounded-xl font-bold bg-green-600 text-white hover:bg-green-700 transition text-sm tracking-wider uppercase";

      document.getElementById('timerOverlay').classList.remove('hidden');
    }

    // --- ⚡ メインボタンの分岐処理 (START / PAUSE / DONEのハンドリング) ---
    function handleMainButtonClick() {
      const btn = document.getElementById('startPauseBtn');
      
      // 終了状態（DONE）のときに押されたら、次のタイマーへ移行
      if (btn.textContent === "DONE") {
        advanceToNextStep();
        return;
      }
      
      // それ以外は通常のタイマーの開始・一時停止
      toggleMainTimer();
    }

    // --- 🚀 次の工程への自動遷移ロジック ---
    function advanceToNextStep() {
      if (currentStepKey === 'DEV') {
        // 現像 ➔ 水洗 3分
        openGenericTimer('WASH1', 3*60, 'text-blue-400', 'Tap Water Wash (Stop Bath)');
      } else if (currentStepKey === 'WASH1') {
        // 水洗 3分 ➔ 定着 5分
        openGenericTimer('FIX', 5*60, 'text-amber-500', 'Non-hardening Fixer Solution');
      } else if (currentStepKey === 'FIX') {
        // 定着 5分 ➔ 水洗 7分
        openGenericTimer('WASH2', 7*60, 'text-blue-400', 'Final Tap Water Wash');
      } else if (currentStepKey === 'WASH2') {
        // 水洗 7分 ➔ PHOTO FLO 1分
        openGenericTimer('FLO', 1*60, 'text-fuchsia-400', 'Wetting Agent (1 Minute)');
      } else if (currentStepKey === 'FLO') {
        // すべて完了
        closeTimer();
      }
    }

    function toggleMainTimer() {
      const btn = document.getElementById('startPauseBtn');
      const display = document.getElementById('timerDisplay');

      if (isTimerRunning) {
        clearInterval(timerInterval);
        isTimerRunning = false;
        btn.textContent = "RESUME";
        btn.className = "py-4 rounded-xl font-bold bg-white text-black hover:bg-gray-200 transition text-sm tracking-wider uppercase";
      } else {
        if (totalSeconds <= 0) return;
        isTimerRunning = true;
        btn.textContent = "PAUSE";
        btn.className = "py-4 rounded-xl font-bold bg-gray-800 text-gray-300 border border-gray-700 transition text-sm tracking-wider uppercase";

        timerInterval = setInterval(() => {
          if (totalSeconds > 0) {
            totalSeconds--;
            updateTimerDisplay();
          } else {
            clearInterval(timerInterval);
            isTimerRunning = false;
            display.classList.add('text-red-500', 'animate-pulse');
            
            // ボタンをDONEに変更
            btn.textContent = "DONE";
            btn.className = "py-4 rounded-xl font-bold bg-blue-600 text-white text-sm tracking-wider uppercase";

            // 通知処理
            if (navigator.vibrate) navigator.vibrate([1000, 500, 1000]);
            try {
              const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
              const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
              osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
              gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
              osc.connect(gain); gain.connect(audioCtx.destination);
              osc.start(); osc.stop(audioCtx.currentTime + 0.8);
            } catch (e) {}
          }
        }, 1000);
      }
    }

    function resetMainTimer() {
      clearInterval(timerInterval);
      isTimerRunning = false;
      totalSeconds = initialSeconds;
      document.getElementById('timerDisplay').classList.remove('text-red-500', 'animate-pulse');
      updateTimerDisplay();

      const btn = document.getElementById('startPauseBtn');
      btn.textContent = "TIMER START";
      btn.className = "py-4 rounded-xl font-bold bg-green-600 text-white uppercase";
    }

    function closeTimer() {
      clearInterval(timerInterval);
      isTimerRunning = false;
      document.getElementById('timerDisplay').classList.remove('text-red-500', 'animate-pulse');
      document.getElementById('timerOverlay').classList.add('hidden');
    }

    function parseTimeToSeconds(timeStr) {
      timeStr = String(timeStr).trim();
      if (timeStr.includes(':')) {
        const parts = timeStr.split(':'); return (parseInt(parts[0], 10) || 0) * 60 + (parseInt(parts[1], 10) || 0);
      } else {
        return Math.round((parseFloat(timeStr) || 0) * 60);
      }
    }

    function updateTimerDisplay() {
      const mins = Math.floor(totalSeconds / 60); const secs = totalSeconds % 60;
      document.getElementById('timerDisplay').textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }
  </script>
</body>
</html>
